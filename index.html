<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a0f1a" />
    <meta name="description" content="Campus Connect — The unified campus management platform for students, faculty, and administrators. Track attendance, payments, notices, and more." />
    <meta name="keywords" content="campus management, student portal, attendance tracker, fee payment, college ERP" />
    <meta name="author" content="Campus Connect" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet" />
    <title>Campus Connect — Smart Campus Management</title>
    <style>
      /* Critical inline CSS for instant first paint */
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; text-rendering: optimizeLegibility; }
      body { font-family: 'Plus Jakarta Sans', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
      #root { min-height: 100vh; }
      .app-boot { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #0a0f1a; }
      .app-boot-spinner { width: 40px; height: 40px; border: 3px solid rgba(114, 208, 167, 0.15); border-top-color: #34d399; border-radius: 50%; animation: boot-spin 0.8s linear infinite; }
      @keyframes boot-spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="app-boot"><div class="app-boot-spinner"></div></div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
